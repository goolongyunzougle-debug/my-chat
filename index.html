<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DayBreak Chat</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DayBreak">
    <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%2309090b'/><text x='50%23' y='55%23' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-weight='900' font-size='95' fill='%2306b6d4'>D</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* 1. 完美收合高度，让 7P - 17PM 视口高度全部统一 */
        html, body {
            height: 100vh;
            height: -webkit-fill-available;
        }
        /* 2. 仅对当前处于“非隐藏状态”的屏幕进行高度规范，绝不冲突隐藏逻辑 */
        #entrance-screen:not(.hidden), #chat-screen:not(.hidden) {
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        /* 3. 强锁中间聊天框高度，彻底阻断老 Safari 内核的拉伸 Bug */
        #chat-box {
            flex: 1 1 0% !important;
            min-height: 0 !important;
            height: 0 !important; 
            -webkit-overflow-scrolling: touch; 
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // 🛠️ 填入你自己的 Supabase 配置
        const SUPABASE_URL = 'https://ybjgkfhcagqqfnqekycr.supabase.co'; // 保持你截图中对应的基础URL
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InliamdrZmhjYWdxcWZucWVreWNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTk0OTUsImV4cCI6MjA5NzI3NTQ5NX0.jG4Hm9JPPBQ9J4jQKCtZDa5MDF_vGYlUo7drur8Xv6g'; 
        
        let supabaseClient;
        let currentRoom = '';
        let myNickname = '';
        let activeChannel = null;

        // 初始化
        window.addEventListener('DOMContentLoaded', () => {
            
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            
            // 尝试读取本地缓存的昵称和房间列表
            myNickname = localStorage.getItem('db_nickname') || '';
            document.getElementById('nickname-input').value = myNickname;
            updateRoomListUI();
            
            // 消除红点监听
            window.addEventListener('focus', () => {
                if ('clearAppBadge' in navigator) navigator.clearAppBadge();
            });
        });

        // 核心逻辑 1：生成带盐的暗号，并自动填充到加入输入框中
        function generateSaltedRoom() {
            let base = document.getElementById('base-room-input').value.trim();
            if(!base) return alert('请输入基础暗号');

            // 🚀 【在这里也加上清洗代码】
            // 确保生成的源头就是绝对干净的
            base = base.replace(/[\s\u200b-\u200d\uFEFF]/g, '');
            
            const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let salt = '';
            for (let i = 0; i < 4; i++) {
                salt += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            const finalRoom = `${base}#${salt}`;
            
            // 1. 在绿色的展示区显示，方便你随时长按复制发给朋友
            document.getElementById('final-room-display').value = finalRoom;
            document.getElementById('salt-result-area').classList.remove('hidden');
            
            // 2. ✨【核心改动】自动把暗号塞进“加入现有空间”的输入框里
            document.getElementById('join-room-input').value = finalRoom;
        }

        // 核心逻辑 2：加入房间
        async function joinRoom(roomID) {
            if(!roomID) {
                roomID = document.getElementById('join-room-input').value.trim();
            }
            // 强力剥离所有空格、零宽空格、不可见格式符
            if(roomID) {
                roomID = roomID.replace(/[\s\u200b-\u200d\uFEFF]/g, '');
            }
            myNickname = document.getElementById('nickname-input').value.trim();
            if(!roomID || !myNickname) return alert('请输入暗号和你的昵称');
            
            // 进门先扫地：清空聊天消息框
            document.getElementById('chat-box').innerHTML = '';
            
            localStorage.setItem('db_nickname', myNickname);
            saveRoomToHistory(roomID);
            
            currentRoom = roomID;
            // ✨【新加】在本地存一份当前正在活动的房间，防止断网刷新丢失
            localStorage.setItem('db_current_active_room', currentRoom); 
            
            document.getElementById('current-room-title').innerText = currentRoom;
            
            // 切换到聊天主界面
            document.getElementById('entrance-screen').classList.add('hidden');
            document.getElementById('chat-screen').classList.remove('hidden');
            
            // 进入房间的同时，顺手把首页大厅的所有暗号痕迹抹除（保留昵称）
            document.getElementById('base-room-input').value = '';   
            document.getElementById('final-room-display').value = ''; 
            document.getElementById('join-room-input').value = '';    
            
            const saltArea = document.getElementById('salt-result-area');
            if (saltArea) saltArea.classList.add('hidden');
        
            // 加载历史记录（仅限当天）
            await loadTodayMessages();
            
            // 开启实时监听
            listenToRoom();
        }

        // 核心逻辑 3：只加载当天的数据
        async function loadTodayMessages() {
            // ✨【核心修复】如果因为换网刷新导致 currentRoom 空了，去备份里拉一把
            if (!currentRoom) {
                currentRoom = localStorage.getItem('db_current_active_room') || '';
            }
            
            // 如果连备份都没有，说明是真的退出了，直接不执行
            if (!currentRoom) return;
            
            // 顺手把顶部的房间名重新校准回来，防止它显示“房间号”三个字
            document.getElementById('current-room-title').innerText = currentRoom;
        
            const todayStart = new Date();
            todayStart.setHours(0,0,0,0);
        
            const { data, error } = await supabaseClient
                .from('messages')
                .select('*')
                .eq('room_id', currentRoom)
                .gte('created_at', todayStart.toISOString())
                .order('created_at', { ascending: true });
        
            if (error) {
                console.error(error);
                alert('同步失败，请检查当前 Wi-Fi 是否能正常联网');
                return;
            }
            
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            if(data) data.forEach(msg => appendMessageUI(msg));
            scrollToBottom();
        }

        // 核心逻辑 4：实时通道与图标红点
        function listenToRoom() {
            if(activeChannel) activeChannel.unsubscribe();
            
            activeChannel = supabaseClient
                .channel(`room:${currentRoom}`)
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `room_id=eq.${currentRoom}` }, payload => {
                    const newMsg = payload.new;
                    appendMessageUI(newMsg);
                    scrollToBottom();
                    
                    // 如果页面不在前台，且收到别人的消息，尝试闪烁红点
                    if(newMsg.sender !== myNickname && document.hidden && ('setAppBadge' in navigator)) {
                        navigator.setAppBadge().catch(e => console.log(e));
                    }
                })
                .subscribe();
        }

        // 发送消息
        async function sendMsg(type = 'text', customContent = '') {
            let content = customContent;
            if(type === 'text') {
                const input = document.getElementById('msg-input');
                content = input.value.trim();
                if(!content) return;
                input.value = '';
            }

            await supabaseClient.from('messages').insert([{
                room_id: currentRoom,
                sender: myNickname,
                content: content,
                msg_type: type
            }]);
        }

        // ✨【新加功能】点击顶部房间名，一键复制暗号到剪贴板
        function copyCurrentRoom() {
            const roomTitle = document.getElementById('current-room-title').innerText;
            if (!roomTitle || roomTitle === '房间号') return;
        
            // 使用现代浏览器通用的剪贴板 API
            navigator.clipboard.writeText(roomTitle).then(() => {
                // 动态改变一下文字，给用户一个“复制成功”的视觉反馈
                const originalTitle = roomTitle;
                document.getElementById('current-room-title').innerText = '✅ 已复制暗号';
                document.getElementById('current-room-title').classList.remove('text-cyan-400');
                document.getElementById('current-room-title').classList.add('text-green-400');
        
                // 1秒后恢复原样
                setTimeout(() => {
                    document.getElementById('current-room-title').innerText = originalTitle;
                    document.getElementById('current-room-title').classList.remove('text-green-400');
                    document.getElementById('current-room-title').classList.add('text-cyan-400');
                }, 1000);
            }).catch(err => {
                alert('复制失败，请手动复制');
            });
        }

        // 模拟发送图片/视频/语音链接（由于纯前端无服务器，这里采用输入链接或模拟方式，后续可扩展Supabase Storage）
        function triggerMediaMock(type) {
            const url = prompt(`请输入要发送的 ${type} 文件的互联网URL地址 (例如 https://xxx.com/abc.png) :`);
            if(url) sendMsg(type, url);
        }

        // ✨【完美稳固版】手机相册/相机照片上传逻辑
        async function uploadAndSendImage(inputElement) {
            const file = inputElement.files?.[0];
            if (!file) return;
        
            // 1. 限制大小 5MB
            if (file.size > 5 * 1024 * 1024) {
                alert('照片太大了，请发送 5MB 以内的照片');
                return;
            }
        
            // 2. 精准获取按钮，给出上传状态提示
            const btn = document.getElementById('upload-image-btn');
            const originalBtnText = btn ? btn.innerText : "🖼️ 拍照/发图";
            if (btn) btn.innerText = "⏳ 上传中...";
        
            try {
                
                // 3. 构造唯一文件名（与房间号无关）
                const fileExt =
                (file.type.split('/')[1] || 'jpg')
                    .replace('jpeg', 'jpg');
                
                const uniqueId =
                    (crypto.randomUUID ? crypto.randomUUID() :
                    `${Date.now()}-${Math.random().toString(36).slice(2,10)}`);
                
                const fileName = `${Date.now()}-${uniqueId}.${fileExt}`;
        
                // 4. 上传到 Supabase Storage
                const { data, error } = await supabaseClient
                    .storage
                    .from('chat-media')
                    .upload(fileName, file, {
                        cacheControl: '3600',
                        upsert: false
                    });
        
                if (error) throw error;
        
                // 5. 拿到公开公网 URL
                const { data: { publicUrl } } = supabaseClient
                    .storage
                    .from('chat-media')
                    .getPublicUrl(fileName);

                console.log(publicUrl);
                
                // 6. 发送消息类型为 image
                await sendMsg('image', publicUrl);
        
            } catch (err) {
                console.error('上传失败:', err);
                alert(err.message);
            } finally {
                // 7. 稳稳恢复按钮状态，并清空选择器
                if (btn) btn.innerText = originalBtnText;
                inputElement.value = '';
            }
        }

        // 辅助：历史记录管理
        function saveRoomToHistory(room) {
            let rooms = JSON.parse(localStorage.getItem('db_rooms') || '[]');
            if(!rooms.includes(room)) rooms.push(room);
            localStorage.setItem('db_rooms', JSON.stringify(rooms));
            updateRoomListUI();
        }

        function updateRoomListUI() {
            let rooms = JSON.parse(localStorage.getItem('db_rooms') || '[]');
            const container = document.getElementById('history-rooms');
            container.innerHTML = '';
            rooms.forEach(r => {
                const btn = document.createElement('button');
                btn.className = "bg-zinc-800 text-left p-3 rounded-xl text-sm border border-zinc-700 text-zinc-300 active:scale-95 transition truncate";
                btn.innerText = r;
                btn.onclick = () => joinRoom(r);
                container.appendChild(btn);
            });
        }

        function appendMessageUI(msg) {
            const box = document.getElementById('chat-box');
            const isMe = msg.sender === myNickname;
            
            const msgWrapper = document.createElement('div');
            msgWrapper.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'} mb-4 px-2`;
            
            let mediaContent = '';
            if(msg.msg_type === 'text') {
                mediaContent = `<p class="break-all">${msg.content}</p>`;
            } else if(msg.msg_type === 'image') {
                mediaContent = `<img src="${msg.content}" class="max-w-[200px] rounded-lg border border-zinc-700" onclick="window.open('${msg.content}')" />`;
            } else if(msg.msg_type === 'audio') {
                mediaContent = `<audio src="${msg.content}" controls class="max-w-[240px]"></audio>`;
            } else if(msg.msg_type === 'video') {
                mediaContent = `<video src="${msg.content}" controls class="max-w-[200px] rounded-lg"></video>`;
            }

            msgWrapper.innerHTML = `
                <span class="text-xs text-zinc-500 mb-1">${msg.sender}</span>
                <div class="${isMe ? 'bg-cyan-500 text-black' : 'bg-zinc-800 text-zinc-200'} p-3 rounded-2xl max-w-[75%] shadow-md text-sm">
                    ${mediaContent}
                </div>
            `;
            box.appendChild(msgWrapper);
        }

        function scrollToBottom() {
            const box = document.getElementById('chat-box');
            box.scrollTop = box.scrollHeight;
        }

        function quitRoom() {
            if(activeChannel) activeChannel.unsubscribe();
            // ✨【新加】主动点退出时，把当前房间的隐形备份彻底销毁，不留痕迹
            localStorage.removeItem('db_current_active_room');
            currentRoom = '';
            
            document.getElementById('chat-screen').classList.add('hidden');
            document.getElementById('entrance-screen').classList.remove('hidden');
        }

        // ✨【自动救砖】换网断连后，自动唤醒并对齐数据
        window.addEventListener('online', async () => {
            // 尝试找回房间
            if (!currentRoom) {
                currentRoom = localStorage.getItem('db_current_active_room') || '';
            }
            if (currentRoom) {
                document.getElementById('chat-box').innerHTML = '';
                await loadTodayMessages();
                listenToRoom(); // 基于新网络重新绑定实时通道
            }
        });
    </script>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans select-none overflow-hidden h-screen w-screen flex flex-col justify-between antialiased">

    <div id="entrance-screen" class="flex-1 overflow-y-auto px-6 py-12 flex flex-col gap-8 pb-safe">
        <div class="text-center mt-6">
            <h1 class="text-3xl font-black tracking-wider text-cyan-400">DAYBREAK</h1>
            <p class="text-xs text-zinc-500 mt-1">极私密 · 当日无痕聊天室</p>
        </div>

        <div class="bg-zinc-900 border border-zinc-800 p-5 rounded-2xl flex flex-col gap-3">
            <label class="text-xs font-bold text-zinc-400 tracking-wide">你的临时聊天昵称</label>
            <input id="nickname-input" type="text" placeholder="例如：Alex" class="bg-zinc-950 border border-zinc-700 rounded-xl p-3 text-sm focus:outline-none focus:border-cyan-500 transition">
        </div>

        <div class="bg-zinc-900 border border-zinc-800 p-5 rounded-2xl flex flex-col gap-4">
            <label class="text-xs font-bold text-zinc-400 tracking-wide">制造新空间 (加盐)</label>
            <div class="flex gap-2">
                <input id="base-room-input" type="text" placeholder="口头暗号，如 coffee" class="flex-1 bg-zinc-950 border border-zinc-700 rounded-xl p-3 text-sm focus:outline-none focus:border-cyan-500 transition">
                <button onclick="generateSaltedRoom()" class="bg-cyan-500 text-black px-4 font-bold rounded-xl text-sm active:scale-95 transition">加盐</button>
            </div>
            <div id="salt-result-area" class="hidden flex flex-col gap-2 mt-2 bg-zinc-950 p-3 rounded-xl border border-zinc-800">
                <span class="text-[10px] text-zinc-500">复制此唯一终极暗号发给朋友：</span>
                <input id="final-room-display" type="text" readonly class="bg-transparent text-sm text-lime-400 font-mono focus:outline-none select-all">
            </div>
        </div>

        <div class="bg-zinc-900 border border-zinc-800 p-5 rounded-2xl flex flex-col gap-3">
            <label class="text-xs font-bold text-zinc-400 tracking-wide">加入现有空间</label>
            <div class="flex flex-col gap-3">
                <input id="join-room-input" type="text" placeholder="粘贴完整的暗号(带#后缀)" class="bg-zinc-950 border border-zinc-700 rounded-xl p-3 text-sm font-mono focus:outline-none focus:border-cyan-500 transition">
                <button onclick="joinRoom()" class="w-full bg-zinc-100 text-black p-3 rounded-xl font-bold text-sm active:scale-95 transition">加入专属空间</button>
            </div>
        </div>

        <div class="flex flex-col gap-2">
            <label class="text-xs font-bold text-zinc-500 tracking-wide">今日绑定的聊天空间 (本地缓存)</label>
            <div id="history-rooms" class="grid grid-cols-2 gap-2">
                </div>
        </div>
    </div>

    <div id="chat-screen" class="hidden flex-1 flex flex-col justify-between overflow-hidden">
        <div class="bg-zinc-900 border-b border-zinc-800 px-4 pt-12 pb-3 flex items-center justify-between">
            <button onclick="quitRoom()" class="text-zinc-400 text-sm active:text-white flex items-center gap-1">← 列表</button>
            <span id="current-room-title" class="font-bold text-cyan-400 cursor-pointer active:opacity-70" onclick="copyCurrentRoom()" title="点击复制暗号">
                房间号
            </span>
            <button onclick="loadTodayMessages()" class="text-cyan-400 text-sm active:scale-95">🔄</button>
        </div>

        <div id="chat-box" class="flex-1 overflow-y-auto p-4 bg-zinc-950 flex flex-col" style="flex: 1 1 0%; min-height: 0;">
        </div>

        <div class="bg-zinc-900 border-t border-zinc-800 p-4 pb-safe flex flex-col gap-3">
            <div class="flex gap-4 text-xs text-zinc-400 border-b border-zinc-800 pb-2">
                <button id="upload-image-btn" onclick="document.getElementById('image-file-input').click()" class="active:text-cyan-400">🖼️ 拍照/发图</button>
                <input id="image-file-input" type="file" accept="image/*" class="hidden" onchange="uploadAndSendImage(this)">
                <button onclick="triggerMediaMock('audio')" class="active:text-cyan-400">🎙️ 发语音</button>
                <button onclick="triggerMediaMock('video')" class="active:text-cyan-400">📹 发视频</button>
            </div>
            <div class="flex gap-2 items-center">
                <input id="msg-input" type="text" placeholder="发条无痕消息..." class="flex-1 bg-zinc-950 border border-zinc-700 rounded-xl p-3 text-sm focus:outline-none focus:border-cyan-500 transition">
                <button onclick="sendMsg('text')" class="bg-cyan-500 text-black px-4 py-3 font-bold rounded-xl text-sm active:scale-95 transition">发送</button>
            </div>
        </div>
    </div>

</body>
</html>
